name: jagalilin  
description: "Mau kaya dengan cepat? Jaga Lilin Aja!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.3
  local_auth: ^2.1.3
  cupertino_icons: ^1.0.8
  sensors_plus: ^7.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^6.0.0

# Konfigurasi Icon
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg" # Sesuaikan dengan file aslimu (.jpg atau .png)

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg  # Daftarkan agar bisa dipakai di dalam aplikasi
    - assets/login.png # Pastikan folder 'assets' (kecil) ini memang ada